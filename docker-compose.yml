services:
  db:
    image: pgvector/pgvector:pg17
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["node", "dist/database/migrations.js"]
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      NODE_ENV: production
    ports:
      - "4000:4000"
    networks:
      - app-network
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
